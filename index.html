<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>University Stall POS</title>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@2.44.0/tabler-icons.min.css">
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg-page:        #f4f6f9;
    --bg-surface:     #ffffff;
    --bg-muted:       #f1f3f7;
    --border:         rgba(0,0,0,0.10);
    --border-md:      rgba(0,0,0,0.18);
    --text-primary:   #111827;
    --text-secondary: #6b7280;
    --text-hint:      #9ca3af;
    --blue:           #185FA5;
    --blue-dark:      #0C447C;
    --blue-bg:        #E6F1FB;
    --green:          #0F6E56;
    --green-dark:     #085041;
    --red:            #A32D2D;
    --red-bg:         #FCEBEB;
    --radius-sm:      6px;
    --radius-md:      8px;
    --radius-lg:      12px;
    --shadow-card:    0 1px 4px rgba(0,0,0,0.06);
  }

  body {
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Arial, sans-serif;
    background: var(--bg-page);
    color: var(--text-primary);
    font-size: 15px;
    line-height: 1.5;
  }

  /* Header */
  header {
    background: var(--bg-surface);
    border-bottom: 0.5px solid var(--border);
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 0 1.5rem;
    height: 56px;
    position: sticky;
    top: 0;
    z-index: 100;
  }
  .logo {
    display: flex;
    align-items: center;
    gap: 9px;
    font-weight: 600;
    font-size: 15px;
    color: var(--text-primary);
  }
  .logo i { font-size: 22px; color: var(--blue); }

  /* Nav */
  nav { display: flex; gap: 4px; }
  nav button {
    display: flex;
    align-items: center;
    gap: 6px;
    padding: 7px 14px;
    border: none;
    border-radius: var(--radius-md);
    background: transparent;
    cursor: pointer;
    font-size: 14px;
    color: var(--text-secondary);
    transition: background .12s, color .12s;
    font-family: inherit;
  }
  nav button i { font-size: 17px; }
  nav button:hover { background: var(--bg-muted); color: var(--text-primary); }
  nav button.active { background: var(--bg-muted); color: var(--text-primary); font-weight: 600; }

  main {
    max-width: 1100px;
    margin: 0 auto;
    padding: 1.75rem 1.5rem;
  }

  .section { display: none; }
  .section.active { display: block; }

  .page-title {
    font-size: 18px;
    font-weight: 600;
    color: var(--text-primary);
    margin-bottom: 1.5rem;
  }

  /* Stat cards */
  .stat-grid {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(160px, 1fr));
    gap: 12px;
    margin-bottom: 1.5rem;
  }
  .stat {
    background: var(--bg-surface);
    border: 0.5px solid var(--border);
    border-radius: var(--radius-lg);
    padding: 1rem 1.2rem;
    box-shadow: var(--shadow-card);
  }
  .stat-label {
    font-size: 12px;
    color: var(--text-secondary);
    margin-bottom: 6px;
    display: flex;
    align-items: center;
    gap: 6px;
    text-transform: uppercase;
    letter-spacing: .04em;
  }
  .stat-label i { font-size: 15px; }
  .stat-value { font-size: 26px; font-weight: 700; color: var(--text-primary); }

  /* Card */
  .card {
    background: var(--bg-surface);
    border: 0.5px solid var(--border);
    border-radius: var(--radius-lg);
    padding: 1.25rem;
    box-shadow: var(--shadow-card);
  }
  .card-title {
    font-size: 14px;
    font-weight: 600;
    color: var(--text-primary);
    margin-bottom: 1rem;
  }

  /* Form */
  .form-grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 12px;
    margin-bottom: 1rem;
  }
  .form-group { display: flex; flex-direction: column; gap: 4px; }
  label { font-size: 13px; color: var(--text-secondary); font-weight: 500; }
  input[type=text], input[type=number] {
    width: 100%;
    padding: 8px 11px;
    border: 0.5px solid var(--border-md);
    border-radius: var(--radius-md);
    background: var(--bg-surface);
    color: var(--text-primary);
    font-size: 14px;
    font-family: inherit;
    outline: none;
    transition: border-color .12s;
  }
  input[type=text]:focus, input[type=number]:focus {
    border-color: var(--blue);
    box-shadow: 0 0 0 3px rgba(24,95,165,0.12);
  }
  input[type=file] {
    font-size: 13px;
    color: var(--text-secondary);
    cursor: pointer;
    padding: 6px 0;
  }

  /* Buttons */
  .btn {
    display: inline-flex;
    align-items: center;
    justify-content: center;
    gap: 6px;
    padding: 9px 16px;
    border: 0.5px solid var(--border-md);
    border-radius: var(--radius-md);
    background: var(--bg-surface);
    cursor: pointer;
    font-size: 14px;
    font-weight: 500;
    color: var(--text-primary);
    font-family: inherit;
    transition: background .12s, border-color .12s, opacity .12s;
  }
  .btn:hover { background: var(--bg-muted); }
  .btn:active { opacity: .85; }
  .btn i { font-size: 16px; }
  .btn-primary { background: var(--blue); color: #fff; border-color: var(--blue); }
  .btn-primary:hover { background: var(--blue-dark); border-color: var(--blue-dark); }
  .btn-success { background: var(--green); color: #fff; border-color: var(--green); }
  .btn-success:hover { background: var(--green-dark); border-color: var(--green-dark); }
  .btn-danger { color: var(--red); background: transparent; border-color: var(--border-md); }
  .btn-danger:hover { background: var(--red-bg); border-color: #f09595; }
  .btn-sm { padding: 6px 12px; font-size: 13px; }
  .btn-block { width: 100%; }

  /* Section header */
  .section-head {
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-bottom: 1.25rem;
  }
  .section-head .page-title { margin-bottom: 0; }

  /* Product grid */
  .product-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
    gap: 14px;
  }
  .product-card {
    background: var(--bg-surface);
    border: 0.5px solid var(--border);
    border-radius: var(--radius-lg);
    overflow: hidden;
    box-shadow: var(--shadow-card);
    transition: border-color .15s, box-shadow .15s;
  }
  .product-card:hover {
    border-color: var(--border-md);
    box-shadow: 0 3px 10px rgba(0,0,0,0.09);
  }
  .product-card img { width: 100%; height: 130px; object-fit: cover; display: block; }
  .product-img-placeholder {
    width: 100%; height: 130px;
    background: var(--bg-muted);
    display: flex; align-items: center; justify-content: center;
    color: var(--text-hint);
  }
  .product-img-placeholder i { font-size: 32px; }
  .product-card-body { padding: 12px; }
  .product-name { font-size: 14px; font-weight: 600; color: var(--text-primary); margin-bottom: 6px; }
  .product-meta {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-bottom: 10px;
  }
  .price-tag { font-size: 15px; font-weight: 700; color: var(--blue); }
  .stock-badge {
    font-size: 12px;
    color: var(--text-secondary);
    background: var(--bg-muted);
    padding: 2px 9px;
    border-radius: 20px;
    border: 0.5px solid var(--border);
  }
  .stock-badge.out { color: var(--red); background: var(--red-bg); }

  /* POS layout */
  .pos-layout {
    display: grid;
    grid-template-columns: 1fr 330px;
    gap: 1.5rem;
    align-items: start;
  }
  .pos-hint { font-size: 13px; color: var(--text-secondary); margin-bottom: 1rem; }

  /* Cart */
  .cart-section {
    background: var(--bg-surface);
    border: 0.5px solid var(--border);
    border-radius: var(--radius-lg);
    padding: 1.25rem;
    box-shadow: var(--shadow-card);
    position: sticky;
    top: 68px;
  }
  .cart-title {
    display: flex;
    align-items: center;
    gap: 8px;
    font-size: 15px;
    font-weight: 600;
    color: var(--text-primary);
    margin-bottom: 1rem;
  }
  .cart-title i { font-size: 18px; color: var(--blue); }
  .cart-empty {
    text-align: center;
    padding: 1.75rem 0;
    color: var(--text-hint);
    font-size: 13px;
  }
  .cart-empty i { font-size: 32px; display: block; margin-bottom: 8px; opacity: .5; }

  .cart-item {
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding: 9px 0;
    border-bottom: 0.5px solid var(--border);
  }
  .cart-item:last-child { border-bottom: none; }
  .cart-item-name { font-size: 13px; font-weight: 500; color: var(--text-primary); margin-bottom: 2px; }
  .cart-item-price { font-size: 12px; color: var(--text-secondary); }
  .cart-item-right { display: flex; align-items: center; gap: 6px; flex-shrink: 0; }
  .cart-item-amt { font-size: 13px; font-weight: 600; color: var(--text-primary); min-width: 52px; text-align: right; }

  /* Qty stepper */
  .qty-stepper { display: flex; align-items: center; gap: 4px; }
  .qty-btn {
    width: 24px; height: 24px;
    border: 0.5px solid var(--border-md);
    border-radius: 5px;
    background: var(--bg-muted);
    cursor: pointer;
    font-size: 14px;
    font-weight: 600;
    color: var(--text-primary);
    display: flex; align-items: center; justify-content: center;
    line-height: 1;
    transition: background .1s;
  }
  .qty-btn:hover { background: var(--border-md); }
  .qty-num { font-size: 13px; font-weight: 600; min-width: 18px; text-align: center; color: var(--text-primary); }

  .cart-remove {
    background: none;
    border: none;
    cursor: pointer;
    color: var(--text-hint);
    padding: 3px 4px;
    border-radius: var(--radius-sm);
    display: flex;
    align-items: center;
    font-size: 15px;
    transition: color .12s, background .12s;
  }
  .cart-remove:hover { color: var(--red); background: var(--red-bg); }

  .cart-divider { height: 0.5px; background: var(--border-md); margin: 10px 0; }
  .cart-total {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-bottom: 1rem;
  }
  .cart-total-label { font-size: 13px; color: var(--text-secondary); }
  .cart-total-val { font-size: 22px; font-weight: 700; color: var(--text-primary); }

  /* Table */
  table { width: 100%; border-collapse: collapse; }
  thead tr { border-bottom: 0.5px solid var(--border-md); }
  th {
    font-size: 12px;
    font-weight: 600;
    color: var(--text-secondary);
    padding: 8px 12px;
    text-align: left;
    text-transform: uppercase;
    letter-spacing: .04em;
  }
  td {
    font-size: 14px;
    color: var(--text-primary);
    padding: 11px 12px;
    border-bottom: 0.5px solid var(--border);
  }
  tbody tr:last-child td { border-bottom: none; }
  tbody tr:hover td { background: var(--bg-muted); }

  /* Empty state */
  .empty-state {
    text-align: center;
    padding: 3rem 0;
    color: var(--text-hint);
    font-size: 14px;
  }
  .empty-state i { font-size: 40px; display: block; margin-bottom: 12px; opacity: .4; }

  /* Toast */
  #toast {
    position: fixed;
    bottom: 24px; left: 50%;
    transform: translateX(-50%) translateY(60px);
    background: #1f2937;
    color: #fff;
    padding: 10px 20px;
    border-radius: var(--radius-md);
    font-size: 14px;
    opacity: 0;
    transition: transform .25s, opacity .25s;
    z-index: 999;
    pointer-events: none;
  }
  #toast.show { transform: translateX(-50%) translateY(0); opacity: 1; }

  /* Responsive */
  @media (max-width: 700px) {
    header { padding: 0 1rem; }
    nav button span { display: none; }
    nav button { padding: 8px 10px; }
    main { padding: 1rem; }
    .pos-layout { grid-template-columns: 1fr; }
    .form-grid { grid-template-columns: 1fr; }
    .cart-section { position: static; }
  }
</style>
</head>
<body>

<div id="toast"></div>

<header>
  <div class="logo">
    <i class="ti ti-building-store" aria-hidden="true"></i>
    University Stall POS
  </div>
  <nav>
    <button class="active" onclick="showTab('dashboard',this)">
      <i class="ti ti-layout-dashboard" aria-hidden="true"></i><span>Dashboard</span>
    </button>
    <button onclick="showTab('products',this)">
      <i class="ti ti-package" aria-hidden="true"></i><span>Products</span>
    </button>
    <button onclick="showTab('pos',this)">
      <i class="ti ti-shopping-cart" aria-hidden="true"></i><span>POS</span>
    </button>
    <button onclick="showTab('reports',this)">
      <i class="ti ti-chart-bar" aria-hidden="true"></i><span>Reports</span>
    </button>
  </nav>
</header>

<main>

  <!-- Dashboard -->
  <div id="dashboard" class="section active">
    <p class="page-title">Dashboard</p>
    <div class="stat-grid">
      <div class="stat">
        <div class="stat-label"><i class="ti ti-package" aria-hidden="true"></i>Total products</div>
        <div class="stat-value" id="totalProducts">0</div>
      </div>
      <div class="stat">
        <div class="stat-label"><i class="ti ti-receipt" aria-hidden="true"></i>Total bills</div>
        <div class="stat-value" id="totalBills">0</div>
      </div>
      <div class="stat">
        <div class="stat-label"><i class="ti ti-coins" aria-hidden="true"></i>Total sales</div>
        <div class="stat-value" id="totalSales">Rs 0</div>
      </div>
    </div>
    <div class="card">
      <p class="card-title">Recent bills</p>
      <div id="recentBills">
        <div class="empty-state" style="padding:1rem 0">
          <i class="ti ti-receipt-off" style="font-size:28px;display:block;margin-bottom:8px;opacity:.4"></i>
          No bills yet
        </div>
      </div>
    </div>
  </div>

  <!-- Products -->
  <div id="products" class="section">
    <div class="section-head">
      <p class="page-title">Products</p>
    </div>
    <div class="card" style="margin-bottom:1.5rem">
      <p class="card-title">Add new product</p>
      <div class="form-grid">
        <div class="form-group">
          <label for="pname">Product name</label>
          <input type="text" id="pname" placeholder="e.g. Fried rice">
        </div>
        <div class="form-group">
          <label for="pprice">Price (Rs)</label>
          <input type="number" id="pprice" placeholder="0" min="0">
        </div>
        <div class="form-group">
          <label for="pqty">Stock quantity</label>
          <input type="number" id="pqty" placeholder="0" min="0">
        </div>
        <div class="form-group">
          <label for="pimg">Product image</label>
          <input type="file" id="pimg" accept="image/*">
        </div>
      </div>
      <button class="btn btn-primary" onclick="saveProduct()">
        <i class="ti ti-plus" aria-hidden="true"></i>Add product
      </button>
    </div>
    <div id="productList" class="product-grid"></div>
  </div>

  <!-- POS -->
  <div id="pos" class="section">
    <p class="page-title">Point of sale</p>
    <div class="pos-layout">
      <div>
        <p class="pos-hint">Tap a product to add it to the cart</p>
        <div id="posProducts" class="product-grid"></div>
      </div>
      <div class="cart-section">
        <div class="cart-title">
          <i class="ti ti-shopping-cart" aria-hidden="true"></i>Cart
        </div>
        <div id="cartItems">
          <div class="cart-empty">
            <i class="ti ti-shopping-cart-off"></i>Cart is empty
          </div>
        </div>
        <div class="cart-divider"></div>
        <div class="cart-total">
          <span class="cart-total-label">Total</span>
          <span class="cart-total-val">Rs <span id="cartTotal">0</span></span>
        </div>
        <button class="btn btn-success btn-block" onclick="generateBill()">
          <i class="ti ti-file-invoice" aria-hidden="true"></i>Generate bill PDF
        </button>
      </div>
    </div>
  </div>

  <!-- Reports -->
  <div id="reports" class="section">
    <div class="section-head">
      <p class="page-title">Sales reports</p>
      <button class="btn btn-primary btn-sm" onclick="downloadSalesReport()">
        <i class="ti ti-download" aria-hidden="true"></i>Download PDF
      </button>
    </div>
    <div class="card">
      <div id="salesTableWrap">
        <div class="empty-state">
          <i class="ti ti-chart-bar-off"></i>No sales recorded yet
        </div>
      </div>
    </div>
  </div>

</main>

<script>
  /* ── State ── */
  let products = JSON.parse(localStorage.getItem("upos_products") || "[]");
  let sales    = JSON.parse(localStorage.getItem("upos_sales")    || "[]");
  let cart     = [];

  const STALL_NAME    = "University Stall";
  const STALL_ADDRESS = "Faculty of Technology, USJP";
  const STALL_PHONE   = "011-2-XXXXXXX";

  /* ── Helpers ── */
  function saveStorage() {
    localStorage.setItem("upos_products", JSON.stringify(products));
    localStorage.setItem("upos_sales",    JSON.stringify(sales));
  }

  function showToast(msg) {
    let t = document.getElementById('toast');
    t.textContent = msg;
    t.classList.add('show');
    setTimeout(() => t.classList.remove('show'), 2200);
  }

  function pad(n, w) { return String(n).padStart(w, '0'); }

  function fmtMoney(n) { return 'Rs ' + n.toFixed(2); }

  /* ── Navigation ── */
  function showTab(id, btn) {
    document.querySelectorAll('.section').forEach(s => s.classList.remove('active'));
    document.querySelectorAll('nav button').forEach(b => b.classList.remove('active'));
    document.getElementById(id).classList.add('active');
    btn.classList.add('active');
  }

  /* ── Products ── */
  function saveProduct() {
    let name  = document.getElementById('pname').value.trim();
    let price = parseFloat(document.getElementById('pprice').value);
    let qty   = parseInt(document.getElementById('pqty').value, 10);
    let file  = document.getElementById('pimg').files[0];
    if (!name)          { alert("Enter a product name."); return; }
    if (!price || price <= 0) { alert("Enter a valid price."); return; }
    if (!qty   || qty   <= 0) { alert("Enter a valid quantity."); return; }
    if (!file)          { alert("Select a product image."); return; }
    let r = new FileReader();
    r.onload = function () {
      products.push({ id: Date.now(), name, price, qty, image: r.result });
      saveStorage();
      renderProducts();
      document.getElementById('pname').value  = '';
      document.getElementById('pprice').value = '';
      document.getElementById('pqty').value   = '';
      document.getElementById('pimg').value   = '';
      showToast(name + ' added.');
    };
    r.readAsDataURL(file);
  }

  function renderProducts() {
    let pl = document.getElementById('productList');
    let pp = document.getElementById('posProducts');
    pl.innerHTML = '';
    pp.innerHTML = '';

    if (products.length === 0) {
      pl.innerHTML = '<div class="empty-state" style="grid-column:1/-1"><i class="ti ti-package-off"></i>No products yet. Add one above.</div>';
      pp.innerHTML = '<div class="empty-state" style="grid-column:1/-1"><i class="ti ti-package-off"></i>No products added yet.</div>';
    }

    products.forEach(p => {
      let img = p.image
        ? `<img src="${p.image}" alt="${p.name}">`
        : `<div class="product-img-placeholder"><i class="ti ti-photo"></i></div>`;

      let stockBadge = p.qty > 0
        ? `<span class="stock-badge">${p.qty} left</span>`
        : `<span class="stock-badge out">Out of stock</span>`;

      let addBtn = p.qty > 0
        ? `<button class="btn btn-primary btn-sm btn-block" onclick="addToCart(${p.id})"><i class="ti ti-plus" aria-hidden="true"></i>Add to cart</button>`
        : `<button class="btn btn-sm btn-block" disabled style="opacity:.45;cursor:not-allowed"><i class="ti ti-ban" aria-hidden="true"></i>Out of stock</button>`;

      pl.innerHTML += `
        <div class="product-card">
          ${img}
          <div class="product-card-body">
            <div class="product-name">${p.name}</div>
            <div class="product-meta">
              <span class="price-tag">${fmtMoney(p.price)}</span>
              ${stockBadge}
            </div>
            <button class="btn btn-danger btn-sm btn-block" onclick="deleteProduct(${p.id})">
              <i class="ti ti-trash" aria-hidden="true"></i>Remove
            </button>
          </div>
        </div>`;

      pp.innerHTML += `
        <div class="product-card">
          ${img}
          <div class="product-card-body">
            <div class="product-name">${p.name}</div>
            <div class="product-meta">
              <span class="price-tag">${fmtMoney(p.price)}</span>
              ${stockBadge}
            </div>
            ${addBtn}
          </div>
        </div>`;
    });

    document.getElementById('totalProducts').textContent = products.length;
    updateDashboard();
  }

  function deleteProduct(id) {
    let p = products.find(x => x.id === id);
    if (!confirm('Delete "' + p.name + '"?')) return;
    products = products.filter(x => x.id !== id);
    // also remove from cart if present
    cart = cart.filter(x => x.id !== id);
    saveStorage();
    renderProducts();
    renderCart();
  }

  /* ── Cart ── */
  function addToCart(id) {
    let p = products.find(x => x.id === id);
    if (!p || p.qty <= 0) { showToast('Out of stock.'); return; }
    let c = cart.find(x => x.id === id);
    if (c) {
      // FIX: cap at available stock
      if (c.qty >= p.qty) { showToast('No more stock available.'); return; }
      c.qty++;
    } else {
      cart.push({ id: p.id, name: p.name, price: p.price, qty: 1 });
    }
    showToast(p.name + ' added to cart.');
    renderCart();
  }

  function changeCartQty(id, delta) {
    let c = cart.find(x => x.id === id);
    if (!c) return;
    let p = products.find(x => x.id === id);
    let newQty = c.qty + delta;
    if (newQty <= 0) {
      cart = cart.filter(x => x.id !== id);
    } else {
      // FIX: cap at stock
      if (p && newQty > p.qty) { showToast('No more stock available.'); return; }
      c.qty = newQty;
    }
    renderCart();
  }

  function renderCart() {
    let ci    = document.getElementById('cartItems');
    let total = cart.reduce((a, c) => a + c.price * c.qty, 0);

    if (cart.length === 0) {
      ci.innerHTML = '<div class="cart-empty"><i class="ti ti-shopping-cart-off"></i>Cart is empty</div>';
    } else {
      ci.innerHTML = cart.map(c => {
        let amt = c.price * c.qty;
        return `
          <div class="cart-item">
            <div style="flex:1;min-width:0">
              <div class="cart-item-name" style="overflow:hidden;text-overflow:ellipsis;white-space:nowrap">${c.name}</div>
              <div class="cart-item-price">${fmtMoney(c.price)} each</div>
            </div>
            <div class="cart-item-right">
              <div class="qty-stepper">
                <button class="qty-btn" onclick="changeCartQty(${c.id},-1)">-</button>
                <span class="qty-num">${c.qty}</span>
                <button class="qty-btn" onclick="changeCartQty(${c.id},1)">+</button>
              </div>
              <span class="cart-item-amt">${fmtMoney(amt)}</span>
              <button class="cart-remove" onclick="removeFromCart(${c.id})" aria-label="Remove">
                <i class="ti ti-trash" aria-hidden="true"></i>
              </button>
            </div>
          </div>`;
      }).join('');
    }

    document.getElementById('cartTotal').textContent = total.toFixed(2);
  }

  function removeFromCart(id) {
    cart = cart.filter(x => x.id !== id);
    renderCart();
  }

  /* ── Bill PDF ── */
  function generateBill() {
    if (cart.length === 0) { alert("Cart is empty."); return; }
    const { jsPDF } = window.jspdf;

    // FIX: deduct stock from products
    cart.forEach(c => {
      let p = products.find(x => x.id === c.id);
      if (p) p.qty = Math.max(0, p.qty - c.qty);
    });
    saveStorage();

    // Build bill data
    let now     = new Date();
    let billNo  = 'B' + pad(sales.length + 1, 5);
    let dateStr = now.toLocaleDateString('en-LK', { year:'numeric', month:'short', day:'2-digit' });
    let timeStr = now.toLocaleTimeString('en-LK', { hour:'2-digit', minute:'2-digit' });
    let subtotal = cart.reduce((a, c) => a + c.price * c.qty, 0);
    let total    = subtotal; // extend here for tax/discount if needed

    // ── jsPDF thermal-style receipt (80mm width = ~226pt, use A4 portrait) ──
    let doc    = new jsPDF({ unit: 'pt', format: 'a4' });
    let pw     = doc.internal.pageSize.getWidth();   // 595 pt
    let ph     = doc.internal.pageSize.getHeight();  // 842 pt
    let lm     = 60;   // left margin
    let rm     = pw - 60; // right margin
    let cw     = rm - lm; // content width
    let y      = 60;

    // helper: add page if near bottom
    function checkPage() {
      if (y > ph - 80) {
        doc.addPage();
        y = 60;
      }
    }

    // helper: horizontal rule
    function hRule(thickness) {
      doc.setLineWidth(thickness || 0.5);
      doc.line(lm, y, rm, y);
      y += 6;
    }
    function dottedRule() {
      doc.setLineDash([3, 4]);
      doc.setLineWidth(0.4);
      doc.line(lm, y, rm, y);
      doc.setLineDash([]);
      y += 6;
    }

    // ── HEADER ──
    doc.setFont('helvetica', 'bold');
    doc.setFontSize(18);
    doc.text(STALL_NAME, pw / 2, y, { align: 'center' }); y += 20;

    doc.setFont('helvetica', 'normal');
    doc.setFontSize(9);
    doc.setTextColor(100);
    doc.text(STALL_ADDRESS, pw / 2, y, { align: 'center' }); y += 13;
    doc.text('Tel: ' + STALL_PHONE, pw / 2, y, { align: 'center' }); y += 16;

    doc.setTextColor(0);
    hRule(0.8); y += 2;

    // Bill info row
    doc.setFontSize(9);
    doc.setFont('helvetica', 'bold');
    doc.text('RECEIPT', lm, y);
    doc.setFont('helvetica', 'normal');
    doc.text(billNo, pw / 2, y, { align: 'center' });
    doc.text(dateStr + '  ' + timeStr, rm, y, { align: 'right' });
    y += 14;

    dottedRule(); y += 2;

    // ── COLUMN HEADERS ──
    let col = {
      item: lm,
      qty:  lm + cw * 0.52,
      rate: lm + cw * 0.67,
      amt:  rm
    };

    doc.setFontSize(8.5);
    doc.setFont('helvetica', 'bold');
    doc.setTextColor(80);
    doc.text('ITEM',         col.item, y);
    doc.text('QTY',          col.qty,  y);
    doc.text('UNIT PRICE',   col.rate, y);
    doc.text('AMOUNT',       col.amt,  y, { align: 'right' });
    y += 5;
    doc.setTextColor(0);
    hRule(0.4); y += 2;

    // ── LINE ITEMS ──
    doc.setFont('helvetica', 'normal');
    doc.setFontSize(10);

    cart.forEach(c => {
      checkPage();
      let amt = c.price * c.qty;
      // wrap long names
      let lines = doc.splitTextToSize(c.name, cw * 0.48);
      doc.text(lines,              col.item, y);
      doc.text(String(c.qty),      col.qty,  y);
      doc.text(c.price.toFixed(2), col.rate, y);
      doc.text(amt.toFixed(2),     col.amt,  y, { align: 'right' });
      y += lines.length * 13;
    });

    y += 4;
    dottedRule(); y += 4;

    // ── TOTALS BLOCK ──
    let totLabelX = lm + cw * 0.55;
    let totValX   = rm;

    doc.setFontSize(10);
    doc.setFont('helvetica', 'normal');
    doc.text('Subtotal',           totLabelX, y);
    doc.text(subtotal.toFixed(2),  totValX,   y, { align: 'right' }); y += 14;

    doc.text('Discount',     totLabelX, y);
    doc.text('0.00',         totValX,   y, { align: 'right' }); y += 14;

    hRule(0.5); y += 2;

    doc.setFont('helvetica', 'bold');
    doc.setFontSize(12);
    doc.text('TOTAL (Rs)',        totLabelX, y);
    doc.text(total.toFixed(2),    totValX,   y, { align: 'right' }); y += 18;

    doc.setFont('helvetica', 'normal');
    doc.setFontSize(9);
    doc.setTextColor(80);

    // Total items summary
    let totalUnits = cart.reduce((a, c) => a + c.qty, 0);
    doc.text('Items sold: ' + cart.length + ' types  |  ' + totalUnits + ' units', lm, y); y += 14;

    doc.setTextColor(0);
    hRule(0.8); y += 6;

    // ── FOOTER ──
    doc.setFontSize(9);
    doc.setFont('helvetica', 'normal');
    doc.setTextColor(100);
    doc.text('Thank you for your purchase!', pw / 2, y, { align: 'center' }); y += 13;
    doc.text('Please keep this receipt for your records.', pw / 2, y, { align: 'center' }); y += 13;
    doc.text('- ' + STALL_NAME + ' -', pw / 2, y, { align: 'center' });
    doc.setTextColor(0);

    // Save record
    sales.push({
      billNo,
      date:       dateStr + ' ' + timeStr,
      total:      parseFloat(total.toFixed(2)),
      items:      cart.length,
      totalUnits: totalUnits
    });
    saveStorage();
    doc.save(billNo + '.pdf');

    cart = [];
    renderCart();
    renderProducts(); // refresh stock display
    renderSales();
    updateDashboard();
    showToast('Bill ' + billNo + ' generated.');
  }

  /* ── Sales ── */
  function renderSales() {
    let wrap = document.getElementById('salesTableWrap');
    if (sales.length === 0) {
      wrap.innerHTML = '<div class="empty-state"><i class="ti ti-chart-bar-off"></i>No sales recorded yet</div>';
      return;
    }
    let rows = [...sales].reverse().map(s => `
      <tr>
        <td style="font-weight:600">${s.billNo}</td>
        <td>${s.date}</td>
        <td style="text-align:center">${s.totalUnits || s.items || '-'}</td>
        <td style="font-weight:600;color:var(--blue)">${fmtMoney(s.total)}</td>
      </tr>`).join('');
    wrap.innerHTML = `
      <table>
        <thead><tr><th>Bill no.</th><th>Date &amp; time</th><th>Units sold</th><th>Amount</th></tr></thead>
        <tbody>${rows}</tbody>
      </table>`;
  }

  /* ── Sales report PDF ── */
  function downloadSalesReport() {
    if (sales.length === 0) { alert("No sales to export."); return; }
    const { jsPDF } = window.jspdf;
    let doc = new jsPDF({ unit: 'pt', format: 'a4' });
    let pw  = doc.internal.pageSize.getWidth();
    let ph  = doc.internal.pageSize.getHeight();
    let lm  = 50, rm = pw - 50;
    let y   = 60;

    function checkPage() {
      if (y > ph - 60) {
        doc.addPage();
        y = 60;
        // repeat column headers
        drawTableHeader();
      }
    }

    function drawTableHeader() {
      doc.setFillColor(235, 240, 248);
      doc.rect(lm, y - 10, rm - lm, 16, 'F');
      doc.setFont('helvetica', 'bold');
      doc.setFontSize(8.5);
      doc.setTextColor(60);
      doc.text('BILL NO.',  lm + 4,      y);
      doc.text('DATE',      lm + 80,     y);
      doc.text('UNITS',     lm + 260,    y);
      doc.text('AMOUNT',    rm - 4,      y, { align: 'right' });
      doc.setTextColor(0);
      y += 10;
      doc.setLineWidth(0.4);
      doc.line(lm, y, rm, y);
      y += 8;
    }

    // Title
    doc.setFont('helvetica', 'bold');
    doc.setFontSize(18);
    doc.text('Sales Report', pw / 2, y, { align: 'center' }); y += 18;

    doc.setFont('helvetica', 'normal');
    doc.setFontSize(9);
    doc.setTextColor(100);
    doc.text(STALL_NAME + ' | ' + STALL_ADDRESS, pw / 2, y, { align: 'center' }); y += 13;
    let genDate = new Date().toLocaleString('en-LK');
    doc.text('Generated: ' + genDate, pw / 2, y, { align: 'center' });
    doc.setTextColor(0);
    y += 18;

    doc.setLineWidth(0.8);
    doc.line(lm, y, rm, y);
    y += 14;

    drawTableHeader();

    // Rows
    doc.setFont('helvetica', 'normal');
    doc.setFontSize(10);
    let grand = 0;
    let totalUnitsAll = 0;
    sales.forEach((s, i) => {
      checkPage();
      if (i % 2 === 0) {
        doc.setFillColor(248, 249, 251);
        doc.rect(lm, y - 9, rm - lm, 16, 'F');
      }
      doc.setTextColor(0);
      doc.text(s.billNo,                    lm + 4,   y);
      doc.text(s.date,                      lm + 80,  y);
      doc.text(String(s.totalUnits || s.items || '-'), lm + 260, y);
      doc.text(s.total.toFixed(2),          rm - 4,   y, { align: 'right' });
      grand += s.total;
      totalUnitsAll += (s.totalUnits || 0);
      y += 16;
    });

    // Grand total
    y += 4;
    doc.setLineWidth(0.8);
    doc.line(lm, y, rm, y);
    y += 12;

    doc.setFont('helvetica', 'bold');
    doc.setFontSize(11);
    doc.text('Grand Total', lm + 4, y);
    doc.text(String(totalUnitsAll), lm + 260, y);
    doc.text(grand.toFixed(2), rm - 4, y, { align: 'right' });
    y += 18;

    doc.setFont('helvetica', 'normal');
    doc.setFontSize(9);
    doc.setTextColor(100);
    doc.text('Total bills: ' + sales.length, lm + 4, y);

    doc.save('sales-report-' + Date.now() + '.pdf');
    showToast('Sales report downloaded.');
  }

  /* ── Dashboard ── */
  function updateDashboard() {
    let sum = sales.reduce((a, b) => a + b.total, 0);
    document.getElementById('totalSales').textContent = fmtMoney(sum);
    document.getElementById('totalBills').textContent = sales.length;

    let rb     = document.getElementById('recentBills');
    let recent = [...sales].reverse().slice(0, 5);
    if (recent.length === 0) {
      rb.innerHTML = '<div class="empty-state" style="padding:1rem 0"><i class="ti ti-receipt-off" style="font-size:26px;display:block;margin-bottom:8px;opacity:.4"></i>No bills yet</div>';
    } else {
      let rows = recent.map(s => `
        <tr>
          <td style="font-weight:600">${s.billNo}</td>
          <td>${s.date}</td>
          <td style="font-weight:600;color:var(--blue)">${fmtMoney(s.total)}</td>
        </tr>`).join('');
      rb.innerHTML = `
        <table>
          <thead><tr><th>Bill no.</th><th>Date</th><th>Total</th></tr></thead>
          <tbody>${rows}</tbody>
        </table>`;
    }
  }

  /* ── Init ── */
  renderProducts();
  renderSales();
  updateDashboard();
</script>
</body>
</html>
