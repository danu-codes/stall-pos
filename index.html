<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>University Stall POS</title>
<style>
*{box-sizing:border-box;font-family:Arial,sans-serif}
body{margin:0;background:#f4f6f9}
header{background:#1f2937;color:#fff;padding:15px;text-align:center}
nav{display:flex;gap:10px;flex-wrap:wrap;padding:10px;background:#fff}
nav button{padding:10px 15px;border:none;border-radius:8px;cursor:pointer}
.section{display:none;padding:15px}
.active{display:block}
.card{background:#fff;padding:12px;border-radius:12px;box-shadow:0 2px 8px rgba(0,0,0,.1);margin:10px}
.grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(220px,1fr));gap:12px}
input{width:100%;padding:8px;margin:5px 0}
img{max-width:100%;height:150px;object-fit:cover;border-radius:8px}
table{width:100%;border-collapse:collapse;background:#fff}
th,td{border:1px solid #ddd;padding:8px}
.btn{background:#2563eb;color:#fff}
.danger{background:#dc2626;color:#fff}
.success{background:#16a34a;color:#fff}
</style>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
</head>
<body>

<header><h1>University Stall POS</h1></header>

<nav>
<button onclick="showTab('dashboard')">Dashboard</button>
<button onclick="showTab('products')">Products</button>
<button onclick="showTab('pos')">POS</button>
<button onclick="showTab('reports')">Reports</button>
</nav>

<div id="dashboard" class="section active">
<h2>Dashboard</h2>
<div class="card">
<p>Total Products: <span id="totalProducts">0</span></p>
<p>Total Sales: Rs <span id="totalSales">0</span></p>
</div>
</div>

<div id="products" class="section">
<h2>Product Management</h2>
<div class="card">
<input id="pname" placeholder="Product Name">
<input id="pprice" type="number" placeholder="Price">
<input id="pqty" type="number" placeholder="Quantity">
<input id="pimg" type="file" accept="image/*">
<button class="btn" onclick="saveProduct()">Save Product</button>
</div>
<div id="productList" class="grid"></div>
</div>

<div id="pos" class="section">
<h2>Point Of Sale</h2>
<div id="posProducts" class="grid"></div>
<h3>Cart</h3>
<table>
<thead><tr><th>Name</th><th>Qty</th><th>Amount</th></tr></thead>
<tbody id="cartBody"></tbody>
</table>
<h3>Total: Rs <span id="cartTotal">0</span></h3>
<button class="success" onclick="generateBill()">Generate Bill PDF</button>
</div>

<div id="reports" class="section">
<h2>Sales Reports</h2>
<table>
<thead><tr><th>Bill</th><th>Date</th><th>Total</th></tr></thead>
<tbody id="salesBody"></tbody>
</table>
<br>
<button class="btn" onclick="downloadSalesReport()">Download Sales Report PDF</button>
</div>

<script>
let products=JSON.parse(localStorage.getItem("products")||"[]");
let sales=JSON.parse(localStorage.getItem("sales")||"[]");
let cart=[];

function showTab(id){
document.querySelectorAll('.section').forEach(s=>s.classList.remove('active'));
document.getElementById(id).classList.add('active');
}

function saveStorage(){
localStorage.setItem("products",JSON.stringify(products));
localStorage.setItem("sales",JSON.stringify(sales));
}

function saveProduct(){
let file=document.getElementById('pimg').files[0];
if(!file){alert("Select image");return;}
let r=new FileReader();
r.onload=function(){
products.push({
id:Date.now(),
name:pname.value,
price:+pprice.value,
qty:+pqty.value,
image:r.result
});
saveStorage();
renderProducts();
};
r.readAsDataURL(file);
}

function renderProducts(){
productList.innerHTML="";
posProducts.innerHTML="";
products.forEach(p=>{
productList.innerHTML+=`
<div class='card'>
<img src='${p.image}'>
<h3>${p.name}</h3>
<p>Rs ${p.price}</p>
<p>Stock: ${p.qty}</p>
<button class='danger' onclick='deleteProduct(${p.id})'>Delete</button>
</div>`;

posProducts.innerHTML+=`
<div class='card'>
<img src='${p.image}'>
<h3>${p.name}</h3>
<p>Rs ${p.price}</p>
<button class='success' onclick='addToCart(${p.id})'>Add</button>
</div>`;
});
totalProducts.innerText=products.length;
updateDashboard();
}

function deleteProduct(id){
products=products.filter(x=>x.id!=id);
saveStorage();
renderProducts();
}

function addToCart(id){
let p=products.find(x=>x.id==id);
let c=cart.find(x=>x.id==id);
if(c)c.qty++;
else cart.push({id:p.id,name:p.name,price:p.price,qty:1});
renderCart();
}

function renderCart(){
cartBody.innerHTML="";
let total=0;
cart.forEach(c=>{
let amt=c.price*c.qty;
total+=amt;
cartBody.innerHTML+=`<tr><td>${c.name}</td><td>${c.qty}</td><td>${amt}</td></tr>`;
});
cartTotal.innerText=total;
}

async function generateBill(){
if(cart.length===0)return;
const {jsPDF}=window.jspdf;
let doc=new jsPDF();
let y=20;
doc.text("UNIVERSITY STALL BILL",20,y); y+=10;
let total=0;
cart.forEach(c=>{
let amt=c.qty*c.price;
total+=amt;
doc.text(`${c.name} x${c.qty} = Rs ${amt}`,20,y);
y+=10;
});
doc.text("Total Rs "+total,20,y+10);
let billNo="B"+Date.now();
sales.push({billNo,date:new Date().toLocaleString(),total});
saveStorage();
doc.save(billNo+".pdf");
cart=[];
renderCart();
renderSales();
}

function renderSales(){
salesBody.innerHTML="";
let sum=0;
sales.forEach(s=>{
sum+=s.total;
salesBody.innerHTML+=`<tr><td>${s.billNo}</td><td>${s.date}</td><td>${s.total}</td></tr>`;
});
totalSales.innerText=sum;
}

function downloadSalesReport(){
const {jsPDF}=window.jspdf;
let doc=new jsPDF();
let y=20;
doc.text("SALES REPORT",20,y); y+=10;
sales.forEach(s=>{
doc.text(`${s.billNo} | ${s.date} | Rs ${s.total}`,10,y);
y+=8;
});
doc.save("sales-report.pdf");
}

function updateDashboard(){
let sum=sales.reduce((a,b)=>a+b.total,0);
totalSales.innerText=sum;
}

renderProducts();
renderSales();
</script>
</body>
</html>
