<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>University Stall POS</title>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@2.44.0/tabler-icons.min.css">
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg-page:      #f4f6f9;
    --bg-surface:   #ffffff;
    --bg-muted:     #f1f3f7;
    --border:       rgba(0,0,0,0.10);
    --border-md:    rgba(0,0,0,0.18);
    --text-primary: #111827;
    --text-secondary: #6b7280;
    --text-hint:    #9ca3af;
    --blue:         #185FA5;
    --blue-dark:    #0C447C;
    --blue-bg:      #E6F1FB;
    --blue-text:    #0C447C;
    --green:        #0F6E56;
    --green-dark:   #085041;
    --red:          #A32D2D;
    --red-bg:       #FCEBEB;
    --radius-sm:    6px;
    --radius-md:    8px;
    --radius-lg:    12px;
    --shadow-card:  0 1px 4px rgba(0,0,0,0.06);
  }

  body {
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Arial, sans-serif;
    background: var(--bg-page);
    color: var(--text-primary);
    font-size: 15px;
    line-height: 1.5;
  }

  /* ── Header ── */
  header {
    background: var(--bg-surface);
    border-bottom: 0.5px solid var(--border);
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 0 1.5rem;
    height: 56px;
    position: sticky;
    top: 0;
    z-index: 100;
  }
  .logo {
    display: flex;
    align-items: center;
    gap: 9px;
    font-weight: 600;
    font-size: 15px;
    color: var(--text-primary);
  }
  .logo i { font-size: 22px; color: var(--blue); }

  /* ── Nav ── */
  nav { display: flex; gap: 4px; }
  nav button {
    display: flex;
    align-items: center;
    gap: 6px;
    padding: 7px 14px;
    border: none;
    border-radius: var(--radius-md);
    background: transparent;
    cursor: pointer;
    font-size: 14px;
    color: var(--text-secondary);
    transition: background .12s, color .12s;
    font-family: inherit;
  }
  nav button i { font-size: 17px; }
  nav button:hover { background: var(--bg-muted); color: var(--text-primary); }
  nav button.active { background: var(--bg-muted); color: var(--text-primary); font-weight: 600; }

  /* ── Main layout ── */
  main {
    max-width: 1100px;
    margin: 0 auto;
    padding: 1.75rem 1.5rem;
  }

  /* ── Sections ── */
  .section { display: none; }
  .section.active { display: block; }

  /* ── Typography ── */
  .page-title {
    font-size: 18px;
    font-weight: 600;
    color: var(--text-primary);
    margin-bottom: 1.5rem;
  }

  /* ── Stat cards ── */
  .stat-grid {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(160px, 1fr));
    gap: 12px;
    margin-bottom: 1.5rem;
  }
  .stat {
    background: var(--bg-surface);
    border: 0.5px solid var(--border);
    border-radius: var(--radius-lg);
    padding: 1rem 1.2rem;
    box-shadow: var(--shadow-card);
  }
  .stat-label {
    font-size: 12px;
    color: var(--text-secondary);
    margin-bottom: 6px;
    display: flex;
    align-items: center;
    gap: 6px;
    text-transform: uppercase;
    letter-spacing: .04em;
  }
  .stat-label i { font-size: 15px; }
  .stat-value { font-size: 26px; font-weight: 700; color: var(--text-primary); }

  /* ── Card ── */
  .card {
    background: var(--bg-surface);
    border: 0.5px solid var(--border);
    border-radius: var(--radius-lg);
    padding: 1.25rem;
    box-shadow: var(--shadow-card);
  }
  .card-title {
    font-size: 14px;
    font-weight: 600;
    color: var(--text-primary);
    margin-bottom: 1rem;
  }

  /* ── Form ── */
  .form-grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 12px;
    margin-bottom: 1rem;
  }
  .form-group { display: flex; flex-direction: column; gap: 4px; }
  .form-group.full { grid-column: 1 / -1; }
  label { font-size: 13px; color: var(--text-secondary); font-weight: 500; }
  input[type=text], input[type=number] {
    width: 100%;
    padding: 8px 11px;
    border: 0.5px solid var(--border-md);
    border-radius: var(--radius-md);
    background: var(--bg-surface);
    color: var(--text-primary);
    font-size: 14px;
    font-family: inherit;
    outline: none;
    transition: border-color .12s;
  }
  input[type=text]:focus, input[type=number]:focus {
    border-color: var(--blue);
    box-shadow: 0 0 0 3px rgba(24,95,165,0.12);
  }
  input[type=file] {
    font-size: 13px;
    color: var(--text-secondary);
    cursor: pointer;
    padding: 6px 0;
  }

  /* ── Buttons ── */
  .btn {
    display: inline-flex;
    align-items: center;
    justify-content: center;
    gap: 6px;
    padding: 9px 16px;
    border: 0.5px solid var(--border-md);
    border-radius: var(--radius-md);
    background: var(--bg-surface);
    cursor: pointer;
    font-size: 14px;
    font-weight: 500;
    color: var(--text-primary);
    font-family: inherit;
    transition: background .12s, border-color .12s, opacity .12s;
  }
  .btn:hover { background: var(--bg-muted); }
  .btn:active { opacity: .85; }
  .btn i { font-size: 16px; }
  .btn-primary { background: var(--blue); color: #fff; border-color: var(--blue); }
  .btn-primary:hover { background: var(--blue-dark); border-color: var(--blue-dark); }
  .btn-success { background: var(--green); color: #fff; border-color: var(--green); }
  .btn-success:hover { background: var(--green-dark); border-color: var(--green-dark); }
  .btn-danger { color: var(--red); background: transparent; border-color: var(--border-md); }
  .btn-danger:hover { background: var(--red-bg); border-color: #f09595; }
  .btn-sm { padding: 6px 12px; font-size: 13px; }
  .btn-block { width: 100%; }

  /* ── Section header ── */
  .section-head {
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-bottom: 1.25rem;
  }
  .section-head .page-title { margin-bottom: 0; }

  /* ── Product grid ── */
  .product-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
    gap: 14px;
    margin-top: 1rem;
  }
  .product-card {
    background: var(--bg-surface);
    border: 0.5px solid var(--border);
    border-radius: var(--radius-lg);
    overflow: hidden;
    box-shadow: var(--shadow-card);
    transition: border-color .15s, box-shadow .15s;
  }
  .product-card:hover {
    border-color: var(--border-md);
    box-shadow: 0 3px 10px rgba(0,0,0,0.09);
  }
  .product-card img { width: 100%; height: 130px; object-fit: cover; display: block; }
  .product-img-placeholder {
    width: 100%; height: 130px;
    background: var(--bg-muted);
    display: flex; align-items: center; justify-content: center;
    color: var(--text-hint);
  }
  .product-img-placeholder i { font-size: 32px; }
  .product-card-body { padding: 12px; }
  .product-name { font-size: 14px; font-weight: 600; color: var(--text-primary); margin-bottom: 6px; }
  .product-meta {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-bottom: 10px;
  }
  .price-tag { font-size: 15px; font-weight: 700; color: var(--blue); }
  .stock-badge {
    font-size: 12px;
    color: var(--text-secondary);
    background: var(--bg-muted);
    padding: 2px 9px;
    border-radius: 20px;
    border: 0.5px solid var(--border);
  }

  /* ── POS layout ── */
  .pos-layout {
    display: grid;
    grid-template-columns: 1fr 330px;
    gap: 1.5rem;
    align-items: start;
  }
  .pos-hint { font-size: 13px; color: var(--text-secondary); margin-bottom: 1rem; }

  /* ── Cart ── */
  .cart-section {
    background: var(--bg-surface);
    border: 0.5px solid var(--border);
    border-radius: var(--radius-lg);
    padding: 1.25rem;
    box-shadow: var(--shadow-card);
    position: sticky;
    top: 68px;
  }
  .cart-title {
    display: flex;
    align-items: center;
    gap: 8px;
    font-size: 15px;
    font-weight: 600;
    color: var(--text-primary);
    margin-bottom: 1rem;
  }
  .cart-title i { font-size: 18px; color: var(--blue); }
  .cart-empty {
    text-align: center;
    padding: 1.75rem 0;
    color: var(--text-hint);
    font-size: 13px;
  }
  .cart-empty i { font-size: 32px; display: block; margin-bottom: 8px; opacity: .5; }
  .cart-item {
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding: 10px 0;
    border-bottom: 0.5px solid var(--border);
  }
  .cart-item:last-child { border-bottom: none; }
  .cart-item-name { font-size: 14px; font-weight: 500; color: var(--text-primary); }
  .cart-item-qty { font-size: 12px; color: var(--text-secondary); margin-top: 2px; }
  .cart-item-right { display: flex; align-items: center; gap: 8px; }
  .cart-item-amt { font-size: 14px; font-weight: 600; color: var(--text-primary); }
  .cart-remove {
    background: none;
    border: none;
    cursor: pointer;
    color: var(--text-hint);
    padding: 3px 5px;
    border-radius: var(--radius-sm);
    display: flex;
    align-items: center;
    font-size: 16px;
    transition: color .12s, background .12s;
  }
  .cart-remove:hover { color: var(--red); background: var(--red-bg); }
  .cart-divider { height: 0.5px; background: var(--border-md); margin: 10px 0; }
  .cart-total {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-bottom: 1rem;
  }
  .cart-total-label { font-size: 13px; color: var(--text-secondary); }
  .cart-total-val { font-size: 22px; font-weight: 700; color: var(--text-primary); }

  /* ── Table ── */
  table { width: 100%; border-collapse: collapse; }
  thead tr { border-bottom: 0.5px solid var(--border-md); }
  th {
    font-size: 12px;
    font-weight: 600;
    color: var(--text-secondary);
    padding: 8px 12px;
    text-align: left;
    text-transform: uppercase;
    letter-spacing: .04em;
  }
  td {
    font-size: 14px;
    color: var(--text-primary);
    padding: 11px 12px;
    border-bottom: 0.5px solid var(--border);
  }
  tbody tr:last-child td { border-bottom: none; }
  tbody tr:hover td { background: var(--bg-muted); }

  /* ── Empty state ── */
  .empty-state {
    text-align: center;
    padding: 3rem 0;
    color: var(--text-hint);
    font-size: 14px;
  }
  .empty-state i { font-size: 40px; display: block; margin-bottom: 12px; opacity: .4; }

  /* ── Divider ── */
  .divider { height: 0.5px; background: var(--border); margin: 1.25rem 0; }

  /* ── Responsive ── */
  @media (max-width: 700px) {
    header { padding: 0 1rem; }
    nav button span { display: none; }
    nav button { padding: 8px 10px; }
    main { padding: 1rem; }
    .pos-layout { grid-template-columns: 1fr; }
    .form-grid { grid-template-columns: 1fr; }
    .form-group.full { grid-column: 1; }
    .cart-section { position: static; }
  }
</style>
</head>
<body>

<header>
  <div class="logo">
    <i class="ti ti-building-store" aria-hidden="true"></i>
    University Stall POS
  </div>
  <nav>
    <button class="active" onclick="showTab('dashboard',this)">
      <i class="ti ti-layout-dashboard" aria-hidden="true"></i><span>Dashboard</span>
    </button>
    <button onclick="showTab('products',this)">
      <i class="ti ti-package" aria-hidden="true"></i><span>Products</span>
    </button>
    <button onclick="showTab('pos',this)">
      <i class="ti ti-shopping-cart" aria-hidden="true"></i><span>POS</span>
    </button>
    <button onclick="showTab('reports',this)">
      <i class="ti ti-chart-bar" aria-hidden="true"></i><span>Reports</span>
    </button>
  </nav>
</header>

<main>

  <!-- Dashboard -->
  <div id="dashboard" class="section active">
    <p class="page-title">Dashboard</p>
    <div class="stat-grid">
      <div class="stat">
        <div class="stat-label"><i class="ti ti-package" aria-hidden="true"></i>Total products</div>
        <div class="stat-value" id="totalProducts">0</div>
      </div>
      <div class="stat">
        <div class="stat-label"><i class="ti ti-receipt" aria-hidden="true"></i>Total bills</div>
        <div class="stat-value" id="totalBills">0</div>
      </div>
      <div class="stat">
        <div class="stat-label"><i class="ti ti-coins" aria-hidden="true"></i>Total sales</div>
        <div class="stat-value" id="totalSales">Rs 0</div>
      </div>
    </div>
    <div class="card">
      <p class="card-title">Recent bills</p>
      <div id="recentBills">
        <div class="empty-state" style="padding:1rem 0">
          <i class="ti ti-receipt-off" style="font-size:28px;display:block;margin-bottom:8px;opacity:.4"></i>
          No bills yet
        </div>
      </div>
    </div>
  </div>

  <!-- Products -->
  <div id="products" class="section">
    <div class="section-head">
      <p class="page-title">Products</p>
    </div>
    <div class="card" style="margin-bottom:1.5rem">
      <p class="card-title">Add new product</p>
      <div class="form-grid">
        <div class="form-group">
          <label for="pname">Product name</label>
          <input type="text" id="pname" placeholder="e.g. Fried rice">
        </div>
        <div class="form-group">
          <label for="pprice">Price (Rs)</label>
          <input type="number" id="pprice" placeholder="0" min="0">
        </div>
        <div class="form-group">
          <label for="pqty">Stock quantity</label>
          <input type="number" id="pqty" placeholder="0" min="0">
        </div>
        <div class="form-group">
          <label for="pimg">Product image</label>
          <input type="file" id="pimg" accept="image/*">
        </div>
      </div>
      <button class="btn btn-primary" onclick="saveProduct()">
        <i class="ti ti-plus" aria-hidden="true"></i>Add product
      </button>
    </div>
    <div id="productList" class="product-grid"></div>
  </div>

  <!-- POS -->
  <div id="pos" class="section">
    <p class="page-title">Point of sale</p>
    <div class="pos-layout">
      <div>
        <p class="pos-hint">Tap a product to add it to the cart</p>
        <div id="posProducts" class="product-grid" style="margin-top:0"></div>
      </div>
      <div class="cart-section">
        <div class="cart-title">
          <i class="ti ti-shopping-cart" aria-hidden="true"></i>Cart
        </div>
        <div id="cartItems">
          <div class="cart-empty">
            <i class="ti ti-shopping-cart-off"></i>Cart is empty
          </div>
        </div>
        <div class="cart-divider"></div>
        <div class="cart-total">
          <span class="cart-total-label">Total</span>
          <span class="cart-total-val">Rs <span id="cartTotal">0</span></span>
        </div>
        <button class="btn btn-success btn-block" onclick="generateBill()">
          <i class="ti ti-file-invoice" aria-hidden="true"></i>Generate bill PDF
        </button>
      </div>
    </div>
  </div>

  <!-- Reports -->
  <div id="reports" class="section">
    <div class="section-head">
      <p class="page-title">Sales reports</p>
      <button class="btn btn-primary btn-sm" onclick="downloadSalesReport()">
        <i class="ti ti-download" aria-hidden="true"></i>Download PDF
      </button>
    </div>
    <div class="card">
      <div id="salesTableWrap">
        <div class="empty-state">
          <i class="ti ti-chart-bar-off"></i>No sales recorded yet
        </div>
      </div>
    </div>
  </div>

</main>

<script>
  let products = JSON.parse(localStorage.getItem("upos_products") || "[]");
  let sales    = JSON.parse(localStorage.getItem("upos_sales")    || "[]");
  let cart     = [];

  /* ── Navigation ── */
  function showTab(id, btn) {
    document.querySelectorAll('.section').forEach(s => s.classList.remove('active'));
    document.querySelectorAll('nav button').forEach(b => b.classList.remove('active'));
    document.getElementById(id).classList.add('active');
    btn.classList.add('active');
  }

  function saveStorage() {
    localStorage.setItem("upos_products", JSON.stringify(products));
    localStorage.setItem("upos_sales",    JSON.stringify(sales));
  }

  /* ── Products ── */
  function saveProduct() {
    let name  = document.getElementById('pname').value.trim();
    let price = +document.getElementById('pprice').value;
    let qty   = +document.getElementById('pqty').value;
    let file  = document.getElementById('pimg').files[0];
    if (!name || !price || !qty) { alert("Please fill in all fields."); return; }
    if (!file) { alert("Please select a product image."); return; }
    let r = new FileReader();
    r.onload = function () {
      products.push({ id: Date.now(), name, price, qty, image: r.result });
      saveStorage();
      renderProducts();
      document.getElementById('pname').value  = '';
      document.getElementById('pprice').value = '';
      document.getElementById('pqty').value   = '';
      document.getElementById('pimg').value   = '';
    };
    r.readAsDataURL(file);
  }

  function renderProducts() {
    let pl = document.getElementById('productList');
    let pp = document.getElementById('posProducts');
    pl.innerHTML = '';
    pp.innerHTML = '';

    if (products.length === 0) {
      pl.innerHTML = '<div class="empty-state" style="grid-column:1/-1"><i class="ti ti-package-off"></i>No products yet. Add one above.</div>';
      pp.innerHTML = '<div class="empty-state" style="grid-column:1/-1"><i class="ti ti-package-off"></i>No products available.</div>';
    }

    products.forEach(p => {
      let img = p.image
        ? `<img src="${p.image}" alt="${p.name}">`
        : `<div class="product-img-placeholder"><i class="ti ti-photo"></i></div>`;

      pl.innerHTML += `
        <div class="product-card">
          ${img}
          <div class="product-card-body">
            <div class="product-name">${p.name}</div>
            <div class="product-meta">
              <span class="price-tag">Rs ${p.price}</span>
              <span class="stock-badge">${p.qty} left</span>
            </div>
            <button class="btn btn-danger btn-sm btn-block" onclick="deleteProduct(${p.id})">
              <i class="ti ti-trash" aria-hidden="true"></i>Remove
            </button>
          </div>
        </div>`;

      pp.innerHTML += `
        <div class="product-card">
          ${img}
          <div class="product-card-body">
            <div class="product-name">${p.name}</div>
            <div class="product-meta">
              <span class="price-tag">Rs ${p.price}</span>
              <span class="stock-badge">${p.qty} left</span>
            </div>
            <button class="btn btn-primary btn-sm btn-block" onclick="addToCart(${p.id})">
              <i class="ti ti-plus" aria-hidden="true"></i>Add to cart
            </button>
          </div>
        </div>`;
    });

    document.getElementById('totalProducts').textContent = products.length;
    updateDashboard();
  }

  function deleteProduct(id) {
    if (!confirm("Delete this product?")) return;
    products = products.filter(x => x.id !== id);
    saveStorage();
    renderProducts();
  }

  /* ── Cart ── */
  function addToCart(id) {
    let p = products.find(x => x.id === id);
    let c = cart.find(x => x.id === id);
    if (c) c.qty++;
    else cart.push({ id: p.id, name: p.name, price: p.price, qty: 1 });
    renderCart();
  }

  function removeFromCart(id) {
    cart = cart.filter(x => x.id !== id);
    renderCart();
  }

  function renderCart() {
    let ci    = document.getElementById('cartItems');
    let total = cart.reduce((a, c) => a + c.price * c.qty, 0);

    if (cart.length === 0) {
      ci.innerHTML = '<div class="cart-empty"><i class="ti ti-shopping-cart-off"></i>Cart is empty</div>';
    } else {
      ci.innerHTML = cart.map(c => {
        let amt = c.price * c.qty;
        return `
          <div class="cart-item">
            <div>
              <div class="cart-item-name">${c.name}</div>
              <div class="cart-item-qty">× ${c.qty} &nbsp;@&nbsp; Rs ${c.price}</div>
            </div>
            <div class="cart-item-right">
              <span class="cart-item-amt">Rs ${amt}</span>
              <button class="cart-remove" onclick="removeFromCart(${c.id})" aria-label="Remove ${c.name}">
                <i class="ti ti-x" aria-hidden="true"></i>
              </button>
            </div>
          </div>`;
      }).join('');
    }

    document.getElementById('cartTotal').textContent = total;
  }

  /* ── Bill PDF ── */
  function generateBill() {
    if (cart.length === 0) { alert("Cart is empty."); return; }
    const { jsPDF } = window.jspdf;
    let doc = new jsPDF();
    let y = 20;

    doc.setFontSize(16);
    doc.text("UNIVERSITY STALL — BILL", 20, y); y += 12;
    doc.setFontSize(11);
    doc.text("Date: " + new Date().toLocaleString(), 20, y); y += 10;
    doc.line(20, y, 190, y); y += 8;

    let total = 0;
    cart.forEach(c => {
      let amt = c.qty * c.price;
      total += amt;
      doc.text(`${c.name}   ×${c.qty}   Rs ${c.price} each   =  Rs ${amt}`, 20, y);
      y += 9;
    });

    doc.line(20, y, 190, y); y += 8;
    doc.setFontSize(13);
    doc.text("Total:  Rs " + total, 20, y);

    let billNo = "B" + Date.now();
    sales.push({ billNo, date: new Date().toLocaleString(), total, items: cart.length });
    saveStorage();
    doc.save(billNo + ".pdf");

    cart = [];
    renderCart();
    renderSales();
    updateDashboard();
  }

  /* ── Sales ── */
  function renderSales() {
    let wrap = document.getElementById('salesTableWrap');
    if (sales.length === 0) {
      wrap.innerHTML = '<div class="empty-state"><i class="ti ti-chart-bar-off"></i>No sales recorded yet</div>';
      return;
    }
    let rows = sales.map(s => `
      <tr>
        <td style="font-weight:600">${s.billNo}</td>
        <td>${s.date}</td>
        <td style="text-align:center">${s.items || '—'}</td>
        <td style="font-weight:600;color:var(--blue)">Rs ${s.total}</td>
      </tr>`).join('');
    wrap.innerHTML = `
      <table>
        <thead><tr><th>Bill no.</th><th>Date &amp; time</th><th>Items</th><th>Amount</th></tr></thead>
        <tbody>${rows}</tbody>
      </table>`;
  }

  function downloadSalesReport() {
    if (sales.length === 0) { alert("No sales to export."); return; }
    const { jsPDF } = window.jspdf;
    let doc = new jsPDF();
    let y = 20;

    doc.setFontSize(16);
    doc.text("SALES REPORT", 20, y); y += 10;
    doc.setFontSize(11);
    doc.text("Generated: " + new Date().toLocaleString(), 20, y); y += 10;
    doc.line(20, y, 190, y); y += 8;

    sales.forEach(s => {
      doc.text(`${s.billNo}  |  ${s.date}  |  Rs ${s.total}`, 20, y);
      y += 8;
    });

    doc.line(20, y, 190, y); y += 8;
    let grand = sales.reduce((a, s) => a + s.total, 0);
    doc.setFontSize(13);
    doc.text("Grand total:  Rs " + grand, 20, y);
    doc.save("sales-report.pdf");
  }

  /* ── Dashboard ── */
  function updateDashboard() {
    let sum = sales.reduce((a, b) => a + b.total, 0);
    document.getElementById('totalSales').textContent = 'Rs ' + sum;
    document.getElementById('totalBills').textContent = sales.length;

    let rb     = document.getElementById('recentBills');
    let recent = sales.slice(-5).reverse();
    if (recent.length === 0) {
      rb.innerHTML = '<div class="empty-state" style="padding:1rem 0"><i class="ti ti-receipt-off" style="font-size:26px;display:block;margin-bottom:8px;opacity:.4"></i>No bills yet</div>';
    } else {
      let rows = recent.map(s => `
        <tr>
          <td style="font-weight:600">${s.billNo}</td>
          <td>${s.date}</td>
          <td style="font-weight:600;color:var(--blue)">Rs ${s.total}</td>
        </tr>`).join('');
      rb.innerHTML = `
        <table>
          <thead><tr><th>Bill no.</th><th>Date</th><th>Total</th></tr></thead>
          <tbody>${rows}</tbody>
        </table>`;
    }
  }

  /* ── Init ── */
  renderProducts();
  renderSales();
  updateDashboard();
</script>
</body>
</html>
